services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: disk_io_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./database/sample_data.sql:/docker-entrypoint-initdb.d/sample_data.sql:ro

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: disk_io_db
      DB_PORT: 3306
      PORT: 5000
    depends_on:
      - mysql

  ml-model:
    build:
      context: ./ml-model
    ports:
      - "5001:5001"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000
      REACT_APP_WS_URL: ws://backend:5000
      HOST: 0.0.0.0
    depends_on:
      - backend

volumes:
  db_data:
